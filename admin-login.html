<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - QSKILL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        .admin-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--gradient-hero);
            position: relative;
            overflow: hidden;
        }
        .admin-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 50%, rgba(255,255,255,0.05) 0%, transparent 50%);
            animation: pulseBg 4s ease-in-out infinite;
        }
        @keyframes pulseBg { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .admin-card {
            background: var(--bg-card);
            border-radius: var(--radius-2xl);
            padding: 48px;
            max-width: 420px;
            width: 100%;
            box-shadow: var(--shadow-2xl);
            border: 1px solid var(--border-color);
            animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.85);
        }
        .dark-mode .admin-card { background: rgba(30, 41, 59, 0.92); }
        .admin-card .lock-icon {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--color-primary-bg);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 36px; color: var(--color-primary);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        .admin-card h1 { text-align: center; font-family: var(--font-display); font-size: 1.75rem; font-weight: 700; color: var(--text-primary); }
        .admin-card p { text-align: center; color: var(--text-secondary); font-size: 0.9375rem; margin-top: 4px; }
        .admin-card .security-badge {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 16px; padding: 8px 16px;
            background: var(--color-success-bg); border-radius: var(--radius-full);
            color: var(--color-success); font-size: 0.75rem; font-weight: 600;
        }
        .input-group { position: relative; margin-top: 20px; }
        .input-group .input-icon {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 1.125rem; transition: all 0.3s ease; z-index: 2;
        }
        .input-group input {
            width: 100%; padding: 14px 16px 14px 48px;
            border: 2px solid var(--border-color); border-radius: var(--radius);
            font-family: var(--font-body); font-size: 1rem;
            transition: all 0.3s ease; background: var(--bg-input); color: var(--text-primary);
        }
        .input-group input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
            outline: none; transform: scale(1.01);
        }
        .input-group input:focus + .input-icon { color: var(--color-primary); transform: translateY(-50%) scale(1.1); }
        .input-group .input-highlight {
            position: absolute; bottom: 0; left: 0; width: 0; height: 3px;
            background: var(--gradient-primary); transition: width 0.4s ease; border-radius: var(--radius-full);
        }
        .input-group input:focus ~ .input-highlight { width: 100%; }
        .login-btn {
            width: 100%; padding: 14px;
            background: var(--gradient-primary); color: white; border: none;
            border-radius: var(--radius); font-family: var(--font-display); font-size: 1rem;
            font-weight: 600; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-top: 24px; position: relative; overflow: hidden;
        }
        .login-btn::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            transform: translateX(-100%); transition: transform 0.6s ease;
        }
        .login-btn:hover::before { transform: translateX(100%); }
        .login-btn:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 10px 35px rgba(37, 99, 235, 0.3); }
        .login-btn:active { transform: scale(0.97); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
        .error-shake { animation: shake 0.5s ease; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .loading-spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: white; animation: spin 0.8s ease infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .back-link { text-align: center; margin-top: 16px; }
        .back-link a { color: var(--text-muted); font-size: 0.875rem; transition: color 0.3s ease; }
        .back-link a:hover { color: var(--text-primary); }
        .admin-route {
            font-family: var(--font-mono); font-size: 0.6875rem;
            color: var(--text-muted); text-align: center; margin-top: 12px;
            opacity: 0.5; user-select: none;
        }
        .portal-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
        .portal-particles span {
            position: absolute; width: 6px; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 50%; animation: floatParticles 6s ease-in-out infinite;
        }
        .portal-particles span:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .portal-particles span:nth-child(2) { top: 20%; right: 15%; animation-delay: 2s; }
        .portal-particles span:nth-child(3) { bottom: 30%; left: 20%; animation-delay: 4s; }
        .portal-particles span:nth-child(4) { bottom: 20%; right: 25%; animation-delay: 1s; }
        .portal-particles span:nth-child(5) { top: 50%; left: 5%; animation-delay: 3s; }
        .portal-particles span:nth-child(6) { top: 60%; right: 5%; animation-delay: 5s; }
        @keyframes floatParticles { 0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; } 50% { transform: translateY(-30px) scale(1.5); opacity: 0.8; } }
        @media (max-width: 768px) { .admin-card { padding: 28px; } .portal-particles { display: none; } }
    </style>
</head>
<body>

    <div class="portal-particles">
        <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- NO TOAST CONTAINER -->

    <div class="admin-container">
        <div class="admin-card">
            <div class="lock-icon"><i class="fas fa-lock"></i></div>
            <h1>Admin Access</h1>
            <p>Secure administrator login panel</p>
            <div class="security-badge">
                <i class="fas fa-shield-alt"></i>
                <span>Restricted Area</span>
            </div>

            <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
                <div class="input-group">
                    <input type="text" id="adminUsername" placeholder="Username" required value="admin" />
                    <i class="fas fa-user input-icon"></i>
                    <div class="input-highlight"></div>
                </div>
                <div class="input-group">
                    <input type="password" id="adminPassword" placeholder="Password" required value="admin123" />
                    <i class="fas fa-lock input-icon"></i>
                    <button type="button" class="toggle-pwd" onclick="togglePassword()">
                        <i id="eyeIcon" class="fas fa-eye"></i>
                    </button>
                    <div class="input-highlight"></div>
                </div>
                <button type="submit" id="loginBtn" class="login-btn">
                    <span id="btnText"><i class="fas fa-sign-in-alt mr-2"></i>Access Dashboard</span>
                </button>
            </form>

            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left mr-2"></i>Return to Website</a>
            </div>

            <div class="admin-route">/admin/secure/access</div>
        </div>
    </div>

    <script>
        // ===== CHECK SESSION =====
        if (sessionStorage.getItem('adminLoggedIn') === 'true') { window.location.href = 'admin-dashboard.html'; }

        // ===== TOGGLE PASSWORD =====
        function togglePassword() {
            const password = document.getElementById('adminPassword');
            const icon = document.getElementById('eyeIcon');
            if (password.type === 'password') { password.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { password.type = 'password'; icon.className = 'fas fa-eye'; }
        }

        // ===== LOGIN HANDLER - NO POPUP =====
        let attempts = 3;

        function handleAdminLogin(e) {
            e.preventDefault();
            const username = document.getElementById('adminUsername');
            const password = document.getElementById('adminPassword');
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');

            if (username.value.length < 3) {
                username.classList.add('error-shake');
                setTimeout(() => username.classList.remove('error-shake'), 500);
                return;
            }
            if (password.value.length < 6) {
                password.classList.add('error-shake');
                setTimeout(() => password.classList.remove('error-shake'), 500);
                return;
            }

            btn.disabled = true;
            btnText.innerHTML = '<span class="loading-spinner mr-2"></span>Authenticating...';

            setTimeout(() => {
                if (username.value === 'admin' && password.value === 'admin123') {
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    sessionStorage.setItem('adminName', 'Admin');
                    const users = JSON.parse(localStorage.getItem('qskillUsers') || '[]');
                    if (!users.find(u => u.email === 'admin@qskill.com')) {
                        users.push({
                            id: Date.now(), name: 'Admin', email: 'admin@qskill.com',
                            password: 'admin123', role: 'admin', status: 'active',
                            joined: new Date().toISOString().split('T')[0]
                        });
                        localStorage.setItem('qskillUsers', JSON.stringify(users));
                    }
                    window.location.href = 'admin-dashboard.html';
                } else {
                    attempts--;
                    btn.disabled = false;
                    btnText.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Access Dashboard';
                    if (attempts === 0) {
                        btn.disabled = true;
                        btnText.innerHTML = '🔒 Locked';
                    } else {
                        password.classList.add('error-shake');
                        setTimeout(() => password.classList.remove('error-shake'), 500);
                        password.value = '';
                        password.focus();
                    }
                }
            }, 1500);
        }

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('adminLoginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>

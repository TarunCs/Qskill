<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instructor Login - QSKILL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--color-secondary), var(--color-primary));
            position: relative;
            overflow: hidden;
        }
        .login-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 50%, rgba(255,255,255,0.05) 0%, transparent 50%);
            animation: pulseBg 4s ease-in-out infinite;
        }
        @keyframes pulseBg { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .login-card {
            background: var(--bg-card);
            border-radius: var(--radius-2xl);
            padding: 48px;
            max-width: 440px;
            width: 100%;
            box-shadow: var(--shadow-2xl);
            border: 1px solid var(--border-color);
            animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.85);
        }
        .dark-mode .login-card { background: rgba(30, 41, 59, 0.92); }
        .login-card .avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--color-secondary-bg);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 36px; color: var(--color-secondary);
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.15);
        }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        .login-card h1 { text-align: center; font-family: var(--font-display); font-size: 1.75rem; font-weight: 700; color: var(--text-primary); }
        .login-card .subtitle { text-align: center; color: var(--text-secondary); font-size: 0.9375rem; margin-top: 4px; }
        .input-group { position: relative; margin-top: 20px; }
        .input-group .input-icon {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 1.125rem; transition: all 0.3s ease; z-index: 2;
        }
        .input-group input {
            width: 100%; padding: 14px 16px 14px 48px;
            border: 2px solid var(--border-color); border-radius: var(--radius);
            font-family: var(--font-body); font-size: 1rem;
            transition: all 0.3s ease; background: var(--bg-input); color: var(--text-primary);
        }
        .input-group input:focus {
            border-color: var(--color-secondary);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.08);
            outline: none; transform: scale(1.01);
        }
        .input-group input:focus + .input-icon { color: var(--color-secondary); transform: translateY(-50%) scale(1.1); }
        .input-group .toggle-pwd {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 1rem; transition: all 0.3s ease; z-index: 2;
        }
        .input-group .toggle-pwd:hover { color: var(--text-primary); transform: translateY(-50%) scale(1.1); }
        .input-group .input-highlight {
            position: absolute; bottom: 0; left: 0; width: 0; height: 3px;
            background: linear-gradient(135deg, var(--color-secondary), var(--color-primary));
            transition: width 0.4s ease; border-radius: var(--radius-full);
        }
        .input-group input:focus ~ .input-highlight { width: 100%; }
        .login-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--color-secondary), var(--color-primary));
            color: white; border: none; border-radius: var(--radius);
            font-family: var(--font-display); font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-top: 24px; position: relative; overflow: hidden;
        }
        .login-btn::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            transform: translateX(-100%); transition: transform 0.6s ease;
        }
        .login-btn:hover::before { transform: translateX(100%); }
        .login-btn:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 10px 35px rgba(124, 58, 237, 0.3); }
        .login-btn:active { transform: scale(0.97); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
        .demo-badge {
            background: var(--color-warning-bg); color: var(--color-warning);
            padding: 12px 16px; border-radius: var(--radius);
            font-size: 0.8125rem; text-align: center; margin-top: 16px;
            border: 1px solid rgba(217, 119, 6, 0.1); transition: all 0.3s ease; cursor: pointer;
        }
        .demo-badge:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(217, 119, 6, 0.1); }
        .demo-badge .admin-hint { font-size: 0.6875rem; opacity: 0.6; margin-top: 4px; font-family: var(--font-mono); }
        .error-shake { animation: shake 0.5s ease; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .loading-spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: white; animation: spin 0.8s ease infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .signup-link { text-align: center; margin-top: 16px; color: var(--text-secondary); font-size: 0.875rem; }
        .signup-link .clickable { color: var(--color-secondary); font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .signup-link .clickable:hover { text-decoration: underline; transform: scale(1.05); }
        .portal-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
        .portal-particles span {
            position: absolute; width: 6px; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 50%; animation: floatParticles 6s ease-in-out infinite;
        }
        .portal-particles span:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .portal-particles span:nth-child(2) { top: 20%; right: 15%; animation-delay: 2s; }
        .portal-particles span:nth-child(3) { bottom: 30%; left: 20%; animation-delay: 4s; }
        .portal-particles span:nth-child(4) { bottom: 20%; right: 25%; animation-delay: 1s; }
        .portal-particles span:nth-child(5) { top: 50%; left: 5%; animation-delay: 3s; }
        .portal-particles span:nth-child(6) { top: 60%; right: 5%; animation-delay: 5s; }
        @keyframes floatParticles { 0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; } 50% { transform: translateY(-30px) scale(1.5); opacity: 0.8; } }
        @media (max-width: 768px) { .login-card { padding: 28px; } .portal-particles { display: none; } }
    </style>
</head>
<body>

    <div class="portal-particles">
        <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- NO TOAST CONTAINER -->

    <div class="login-container">
        <div class="login-card">
            <div class="avatar"><i class="fas fa-chalkboard-teacher"></i></div>
            <h1>Instructor Portal</h1>
            <p class="subtitle">Manage your courses and students</p>

            <form id="loginForm" onsubmit="handleInstructorLogin(event)">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email address" required value="instructor@qskill.com" />
                    <i class="fas fa-envelope input-icon"></i>
                    <div class="input-highlight"></div>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required value="password123" />
                    <i class="fas fa-lock input-icon"></i>
                    <button type="button" class="toggle-pwd" onclick="togglePassword()">
                        <i id="eyeIcon" class="fas fa-eye"></i>
                    </button>
                    <div class="input-highlight"></div>
                </div>
                <div class="flex items-center justify-between text-sm mt-4" style="color:var(--text-secondary);">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" class="mr-2 rounded" checked /> Remember me
                    </label>
                    <span onclick="forgotPassword()" style="color:var(--color-secondary);" class="cursor-pointer hover:underline">Forgot password?</span>
                </div>
                <button type="submit" id="loginBtn" class="login-btn">
                    <span id="btnText"><i class="fas fa-sign-in-alt mr-2"></i>Sign In</span>
                </button>
            </form>

            <div class="demo-badge" onclick="fillDemoCredentials()">
                <p class="font-semibold">🎯 Quick Demo Access</p>
                <p class="text-xs mt-1">Instructor: instructor@qskill.com / password123</p>
                <p class="text-xs mt-1">🔑 Admin: admin@qskill.com / admin123</p>
                <p class="admin-hint">Click anywhere to auto-fill credentials</p>
            </div>

            <div class="signup-link">
                Want to become an instructor? <span class="clickable" onclick="showSignup()">Apply now</span>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // ===== TOGGLE PASSWORD =====
        // ============================================
        function togglePassword() {
            const password = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (password.type === 'password') { password.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { password.type = 'password'; icon.className = 'fas fa-eye'; }
        }

        // ============================================
        // ===== FILL DEMO CREDENTIALS - NO POPUP =====
        // ============================================
        function fillDemoCredentials() {
            document.getElementById('email').value = 'instructor@qskill.com';
            document.getElementById('password').value = 'password123';
        }

        // ============================================
        // ===== FORGOT PASSWORD - NO POPUP =====
        // ============================================
        function forgotPassword() {
            document.getElementById('email').focus();
        }

        // ============================================
        // ===== SIGNUP - NO POPUP =====
        // ============================================
        function showSignup() {
            const email = document.getElementById('email').value;
            if (!email || !email.includes('@')) {
                document.getElementById('email').focus();
                document.getElementById('email').classList.add('error-shake');
                setTimeout(() => document.getElementById('email').classList.remove('error-shake'), 500);
                return;
            }
            const users = JSON.parse(localStorage.getItem('qskillUsers') || '[]');
            if (users.find(u => u.email === email)) {
                document.getElementById('email').classList.add('error-shake');
                setTimeout(() => document.getElementById('email').classList.remove('error-shake'), 500);
                return;
            }
            users.push({
                id: Date.now(),
                name: email.split('@')[0],
                email: email,
                password: 'password123',
                role: 'instructor',
                status: 'active',
                joined: new Date().toISOString().split('T')[0]
            });
            localStorage.setItem('qskillUsers', JSON.stringify(users));
            document.getElementById('password').value = 'password123';
        }

        // ============================================
        // ===== LOGIN HANDLER - NO POPUP =====
        // ============================================
        let attempts = 3;

        function handleInstructorLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');

            if (!email.value.includes('@')) {
                email.classList.add('error-shake');
                setTimeout(() => email.classList.remove('error-shake'), 500);
                return;
            }
            if (password.value.length < 6) {
                password.classList.add('error-shake');
                setTimeout(() => password.classList.remove('error-shake'), 500);
                return;
            }

            btn.disabled = true;
            btnText.innerHTML = '<span class="loading-spinner mr-2"></span>Signing in...';

            setTimeout(() => {
                const users = JSON.parse(localStorage.getItem('qskillUsers') || '[]');
                const user = users.find(u => u.email === email.value);

                // === ADMIN CHECK ===
                if (email.value === 'admin@qskill.com' && password.value === 'admin123') {
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    sessionStorage.setItem('adminName', 'Admin');
                    if (!users.find(u => u.email === 'admin@qskill.com')) {
                        users.push({
                            id: Date.now(), name: 'Admin', email: 'admin@qskill.com',
                            password: 'admin123', role: 'admin', status: 'active',
                            joined: new Date().toISOString().split('T')[0]
                        });
                        localStorage.setItem('qskillUsers', JSON.stringify(users));
                    }
                    window.location.href = 'admin-dashboard.html';
                    return;
                }

                // === REGULAR USER CHECK ===
                if (user) {
                    if (user.password === password.value) {
                        if (user.status === 'suspended') {
                            btn.disabled = false;
                            btnText.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Sign In';
                            return;
                        }
                        if (user.role === 'student') {
                            sessionStorage.setItem('studentLoggedIn', 'true');
                            sessionStorage.setItem('studentEmail', user.email);
                            sessionStorage.setItem('studentName', user.name);
                            window.location.href = 'student-dashboard.html';
                        } else if (user.role === 'instructor') {
                            sessionStorage.setItem('instructorLoggedIn', 'true');
                            sessionStorage.setItem('instructorEmail', user.email);
                            sessionStorage.setItem('instructorName', user.name);
                            window.location.href = 'instructor-dashboard.html';
                        } else if (user.role === 'admin') {
                            sessionStorage.setItem('adminLoggedIn', 'true');
                            sessionStorage.setItem('adminName', user.name);
                            window.location.href = 'admin-dashboard.html';
                        }
                        return;
                    } else {
                        attempts--;
                        btn.disabled = false;
                        btnText.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Sign In';
                        if (attempts === 0) {
                            btn.disabled = true;
                            btnText.innerHTML = '🔒 Locked';
                        } else {
                            password.classList.add('error-shake');
                            setTimeout(() => password.classList.remove('error-shake'), 500);
                            password.value = '';
                            password.focus();
                        }
                        return;
                    }
                } else {
                    attempts--;
                    btn.disabled = false;
                    btnText.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Sign In';
                    if (attempts === 0) {
                        btn.disabled = true;
                        btnText.innerHTML = '🔒 Locked';
                    } else {
                        email.classList.add('error-shake');
                        setTimeout(() => email.classList.remove('error-shake'), 500);
                    }
                }
            }, 1500);
        }

        // ============================================
        // ===== KEYBOARD SHORTCUTS =====
        // ============================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });

        // ============================================
        // ===== CHECK SESSION =====
        // ============================================
        if (sessionStorage.getItem('instructorLoggedIn') === 'true') {
            window.location.href = 'instructor-dashboard.html';
        }
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }
        if (sessionStorage.getItem('studentLoggedIn') === 'true') {
            window.location.href = 'student-dashboard.html';
        }
    </script>
</body>
</html>
